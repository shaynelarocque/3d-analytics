<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portfolio Analytics Tycoon 2</title>
  <link rel="icon" href="assets/favicon.ico">
  <link rel="stylesheet" href="style.css">
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.162.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.162.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>
  <canvas id="viewport"></canvas>

  <!-- RCT2-style UI overlay -->
  <div id="ui-overlay">
    <!-- Top bar -->
    <div id="top-bar">
      <div id="site-name">Loading...</div>
      <div id="date-filter">
        <button class="filter-btn" data-range="24h">24h</button>
        <button class="filter-btn" data-range="7d">7d</button>
        <button class="filter-btn" data-range="30d">30d</button>
        <button class="filter-btn active" data-range="90d">90d</button>
      </div>
      <div id="active-count">
        <span class="pulse-dot"></span>
        <span id="active-num">0</span> online
      </div>
    </div>

    <!-- Timeline -->
    <div id="timeline-panel">
      <div id="timeline-dates">
        <span id="timeline-start-label">--</span>
        <span id="timeline-current-label">--</span>
        <span id="timeline-end-label">--</span>
      </div>
      <div id="timeline-track">
        <div id="timeline-progress"></div>
        <div id="timeline-scrubber"></div>
      </div>
      <div id="timeline-controls">
        <button id="timeline-playpause" class="filter-btn">&#9654;</button>
        <button id="timeline-speed" class="filter-btn">1x</button>
      </div>
    </div>

    <!-- Minimap -->
    <div id="minimap-frame">
      <canvas id="minimap" width="160" height="160"></canvas>
      <div id="minimap-label">World Map</div>
    </div>

    <!-- Stats panel -->
    <div id="stats-panel">
      <div class="panel-title">Visitor Log <button class="close-btn" data-collapse="stats-panel">&times;</button></div>
      <div id="stats-content">
        <div class="stat-row">
          <span class="stat-label">Views</span>
          <span class="stat-value" id="stat-today">0</span>
        </div>
        <div class="stat-row">
          <span class="stat-label">Visitors</span>
          <span class="stat-value" id="stat-pages">0</span>
        </div>
        <div class="stat-row">
          <span class="stat-label">Bounces</span>
          <span class="stat-value" id="stat-bounces">0</span>
        </div>
        <div class="stat-row">
          <span class="stat-label">Avg Time</span>
          <span class="stat-value" id="stat-time">0s</span>
        </div>
      </div>
    </div>

    <!-- Chat / activity log -->
    <div id="chat-log">
      <div class="panel-title">Activity <button class="close-btn" data-collapse="chat-log">&times;</button></div>
      <div id="chat-messages"></div>
    </div>

    <!-- Room info popup -->
    <div id="room-info" class="hidden">
      <div class="panel-title" id="room-info-title">Room <button class="close-btn" data-collapse="room-info">&times;</button></div>
      <div id="room-info-content"></div>
    </div>
  </div>

  <!-- Loading screen -->
  <div id="loading-screen">
    <canvas id="box-canvas"></canvas>
    <div id="loading-content">
      <div id="loading-subtitle">Building your park...</div>
      <div id="loading-bar-outer">
        <div id="loading-bar-inner"></div>
      </div>
      <div id="loading-tip">Tip: Click on a guest to follow them around the park</div>
    </div>
  </div>

  <!-- Box set 3D viewer (runs immediately, before main app) -->
  <script type="module">
    import * as THREE from 'three';

    const canvas = document.getElementById('box-canvas');
    if (canvas) {
      const renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: true });
      renderer.setPixelRatio(window.devicePixelRatio);
      renderer.setSize(480, 480);
      renderer.setClearColor(0x000000, 0);

      const scene = new THREE.Scene();
      const camera = new THREE.PerspectiveCamera(32, 1, 0.1, 100);
      camera.position.set(0, 0.1, 3.2);

      // Lighting
      scene.add(new THREE.AmbientLight(0xffffff, 0.6));
      const key = new THREE.DirectionalLight(0xffffff, 0.9);
      key.position.set(2, 3, 4);
      scene.add(key);
      const rim = new THREE.DirectionalLight(0xaaccff, 0.3);
      rim.position.set(-3, 1, -2);
      scene.add(rim);

      // DVD-style box dimensions (aspect ratio ~7.5:10.5:0.6 inches)
      const boxW = 0.9;   // width (front face)
      const boxH = 1.26;  // height
      const boxD = 0.08;  // depth (spine thickness)

      const loader = new THREE.TextureLoader();
      const loadTex = (url) => new Promise(resolve => {
        loader.load(url, tex => {
          tex.colorSpace = THREE.SRGBColorSpace;
          resolve(tex);
        });
      });

      Promise.all([
        loadTex('assets/PAT2_Front.png'),
        loadTex('assets/PAT2_Back.png'),
        loadTex('assets/PAT2_Spine.png'),
      ]).then(([front, back, spine]) => {
        // Box faces: +X, -X, +Y, -Y, +Z (front), -Z (back)
        const edge = new THREE.MeshStandardMaterial({ color: 0x383B38, roughness: 0.8 });
        const materials = [
          edge,                                                                               // right (+X) = open mouth
          new THREE.MeshStandardMaterial({ map: spine, roughness: 0.6, metalness: 0.05 }),  // left (-X) = spine
          edge,                                                                               // top
          edge,                                                                               // bottom
          new THREE.MeshStandardMaterial({ map: front, roughness: 0.5, metalness: 0.05 }),   // front (+Z)
          new THREE.MeshStandardMaterial({ map: back, roughness: 0.5, metalness: 0.05 }),    // back (-Z)
        ];

        const geo = new THREE.BoxGeometry(boxW, boxH, boxD);
        const box = new THREE.Mesh(geo, materials);
        scene.add(box);

        // Full rotation
        function animate() {
          if (!document.getElementById('box-canvas')) return;
          requestAnimationFrame(animate);
          box.rotation.y += 0.01;
          box.rotation.x = Math.sin(box.rotation.y * 0.4) * 0.1;
          renderer.render(scene, camera);
        }
        animate();
      });
    }
  </script>

  <script type="module" src="js/app.js"></script>
</body>
</html>
